name: Release

on:
  release:
    types: [published]

jobs:
  build-and-attach:
    name: Build frontend and attach to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend card
        working-directory: frontend
        run: npm run build

      - name: Upload card to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/librus-messages-card.js
