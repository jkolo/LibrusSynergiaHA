dismiss_message_notification:
  name: Odrzuć powiadomienie o wiadomości
  description: >
    Wycisza powiadomienie o wiadomości w Home Assistant (notification_dismissed=True).
    NIE wpływa na status odczytu w Librusie — w przeglądarce dziennika dalej
    będzie widoczna jako nowa. Stan przeżywa restart HA.
  fields:
    entry:
      name: Konto Librus
      required: true
      selector:
        config_entry:
          integration: librus_apix
    message_href:
      name: Identyfikator wiadomości (href)
      description: >
        Numeryczny ID wiadomości — widoczny w atrybucie `href` sensora
        wiadomości (np. state_attr('sensor.librus_jan_kowalski_wiadomosci',
        'messages')[0].href).
      required: true
      example: "12345"
      selector:
        text:

restore_message_notification:
  name: Przywróć powiadomienie o wiadomości
  description: Usuwa flagę notification_dismissed — powiadomienie pojawi się ponownie.
  fields:
    entry:
      name: Konto Librus
      required: true
      selector:
        config_entry:
          integration: librus_apix
    message_href:
      name: Identyfikator wiadomości (href)
      required: true
      selector:
        text:

clear_dismissed_notifications:
  name: Wyczyść wszystkie odrzucone powiadomienia
  description: Usuwa wszystkie flagi notification_dismissed dla wybranego konta.
  fields:
    entry:
      name: Konto Librus
      required: true
      selector:
        config_entry:
          integration: librus_apix

fetch_message_content:
  name: Pobierz treść wiadomości
  description: >
    Pobiera pełną treść wiadomości z Librusa i zwraca w response_variable
    (content, author, title, date).

    UWAGA PRIVACY: pobranie treści SERVER-SIDE oznacza wiadomość jako
    przeczytaną w Librusie. W przeglądarce dziennika ikona "nowa" zniknie.
    Drugi rodzic na osobnym koncie nie jest dotknięty. Service automatycznie
    ustawia notification_dismissed=True.
  fields:
    entry:
      name: Konto Librus
      required: true
      selector:
        config_entry:
          integration: librus_apix
    message_href:
      name: Identyfikator wiadomości (href)
      description: >
        Numeryczny ID wiadomości — widoczny w atrybucie `href` sensora wiadomości.
      required: true
      example: "12345"
      selector:
        text:
